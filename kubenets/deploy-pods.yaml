apiVersion: v1
kind: Pod
metadata:
  name: web1
  labels:
    name: web1
spec:
  containers:
  - name: web1
    image: krons/app
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"
    ports:
      - containerPort: 8000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web1
spec:
  selector:
    matchLabels:
      app: web1
  template:
    metadata:
      labels:
        app: web1
    spec:
      containers:
      - name: web1
        image: krons/app
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: web1
spec:
  selector:
    app: web1
  type: LoadBalancer
  ports:
  - port: 7171
    targetPort: 8000
