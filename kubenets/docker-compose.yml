services:
   web: 
     image: nginx
     ports:
       - "9191:80"
    
   flask:
       image: krons/app
       ports:
         - "8000:8000"

   db:
     image: mysql:8
     environment:
        MYSQL_ROOT_PASSWORD: root
     ports:
       - "3306:3306"
     volumes:
       - data:/var/lib/mysql

volumes:
  data:


  